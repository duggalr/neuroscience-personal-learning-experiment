# Fly.io config for the Neuro backend.
# Set `app` to your chosen (globally-unique) name and `primary_region` to one near you.
# Run all fly commands from this directory (backend/).

app = "neuro-backend"
primary_region = "iad"   # iad=Ashburn, yyz=Toronto, bos=Boston — pick the closest

[build]

[env]
  NEURO_DB_PATH = "/data/neuro.db"

# Persistent SQLite lives here. Create the volume with:
#   fly volumes create neuro_data --size 1 --region <region>
[mounts]
  source = "neuro_data"
  destination = "/data"

[http_service]
  internal_port = 8001
  force_https = true
  auto_stop_machines = "stop"     # sleeps when idle (saves money), wakes on request
  auto_start_machines = true
  min_machines_running = 0        # set to 1 if you want zero cold-starts (costs more)

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
